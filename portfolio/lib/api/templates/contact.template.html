<div
    style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 0 auto; padding: 24px;">
    <h2 style="color: #1a1a2e; margin-bottom: 4px;">New Contact Form Message</h2>
    <p style="color: #888; font-size: 13px; margin-top: 0;">From your portfolio at sahragty.me</p>
    <hr style="border: none; border-top: 1px solid #e5e5e5; margin: 20px 0;" />
    <table style="width: 100%; border-collapse: collapse;">
        <tr>
            <td style="padding: 8px 0; color: #666; width: 80px; vertical-align: top;"><strong>Name</strong></td>
            <td style="padding: 8px 0; color: #1a1a2e;">{{NAME}}</td>
        </tr>
        <tr>
            <td style="padding: 8px 0; color: #666; vertical-align: top;"><strong>Email</strong></td>
            <td style="padding: 8px 0;"><a href="mailto:{{EMAIL}}" style="color: #0066cc;">{{EMAIL}}</a></td>
        </tr>
    </table>
    <div
        style="margin-top: 20px; padding: 16px; background: #f8f9fa; border-radius: 8px; border-left: 4px solid #0066cc;">
        <strong style="color: #666; font-size: 13px; display: block; margin-bottom: 8px;">Message</strong>
        <div style="color: #1a1a2e; white-space: pre-wrap; line-height: 1.6;">{{MESSAGE}}</div>
    </div>
    <p style="color: #aaa; font-size: 11px; margin-top: 24px; text-align: center;">
        Sent via portfolio contact form &middot; Reply directly to respond to {{NAME}}
    </p>
</div>
