# ==============================================================================

# n8n.sahragty.me

# ==============================================================================

# Optimized for Cloudflare Tunnel (HTTP-only proxy)

# SSL/TLS Termination: Handled by Cloudflare at edge

# Real Client IP: Extracted from CF-Connecting-IP header

# ==============================================================================

server {
set $forward_scheme http;
set $server "n8n-app";
set $port 5678;

listen 80;

server_name n8n.sahragty.me;

# Asset Caching

include conf.d/include/assets.conf;

# Block Exploits

include conf.d/include/block-exploits.conf;

# Headers for Cloudflare Tunnel optimization

proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection $http_connection;
proxy_http_version 1.1;

# Real client IP from Cloudflare

proxy_set_header X-Real-IP $http_cf_connecting_ip;
proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
proxy_set_header X-Forwarded-Proto https;
proxy_set_header CF-RAY $http_cf_ray;
proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;

# Enhanced logging with Cloudflare information

access_log /data/logs/n8n_access.log cloudflare_detailed;
error_log /data/logs/n8n_error.log warn;

# Log 4xx/5xx errors separately for easier monitoring

access_log /data/logs/n8n_error.log cloudflare_error if=$loggable_error;

location / {

    # Authorization
    auth_basic            "Authorization required";
    auth_basic_user_file  /data/access/KEY;

    proxy_set_header Authorization "";

    # Access Rules: 0 total
    deny all;

    # Access checks must...
    satisfy any;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_connection;
    proxy_http_version 1.1;

    # Proxy!
    include conf.d/include/proxy.conf;

}

# PWA static assets — served directly by nginx (no auth required)

location = /n8n-manifest.json {
    alias /data/pwa/n8n/manifest.json;
    default_type application/manifest+json;
    add_header Cache-Control "no-cache";
    add_header Access-Control-Allow-Origin "https://n8n.sahragty.me";
    add_header Access-Control-Allow-Credentials "true";
}

location = /n8n-sw.js {
    alias /data/pwa/n8n/sw.js;
    default_type text/javascript;
    add_header Cache-Control "no-cache";
    add_header Service-Worker-Allowed "/";
}

# ^~ modifier: skip regex evaluation (prevents assets.conf ~* \.png rule from taking priority)
location ^~ /n8n-pwa-icons/ {
    alias /data/pwa/n8n/icons/;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
}

# Custom

include /data/nginx/custom/server_proxy[.]conf;
}
