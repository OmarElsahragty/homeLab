# ==============================================================================
# sahragty.me (Portfolio Website)
# ==============================================================================
# Optimized for Cloudflare Tunnel (HTTP-only)
# SSL/TLS Termination: Handled by Cloudflare at edge
# Static Files: Served directly from /var/www/react-app (read-only mount)
# ==============================================================================

server {
  set $forward_scheme http;
  set $server         "127.0.0.1";
  set $port           80;

  listen 80;

  server_name sahragty.me;

  # Block Exploits
  include conf.d/include/block-exploits.conf;







  # Enhanced logging with Cloudflare information
  access_log /data/logs/portfolio_access.log cloudflare_detailed;
  error_log /data/logs/portfolio_error.log warn;
  
  # Log 4xx/5xx errors separately for easier monitoring
  access_log /data/logs/portfolio_error.log cloudflare_error if=$loggable_error;

# Cloudflare header logging (for debugging)
# add_header X-CF-Ray $http_cf_ray always;

# Disable caching of HTML (always fetch latest)
set $cache_control "no-store, no-cache, must-revalidate, proxy-revalidate";
location ~ \.html$ {
  add_header Cache-Control "$cache_control" always;
}

# Cache static assets aggressively (Cloudflare will cache further)
location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
  expires 31536000s;  # 1 year
  add_header Cache-Control "public, immutable" always;
}

# Explicitly set the root
root /var/www/react-app;

location / {
    index index.html;
    try_files $uri $uri/ /index.html;
    
    # Force the correct MIME type for JS and CSS
    include /etc/nginx/mime.types;
}

location /assets/ {
    # Alias ensures Nginx looks in exactly the right spot
    alias /var/www/react-app/assets/;
    include /etc/nginx/mime.types;
    try_files $uri =404;
}





  # Custom
  include /data/nginx/custom/server_proxy[.]conf;
}
