# ==============================================================================
# Custom HTTP-level Configuration for Nginx Proxy Manager
# ==============================================================================
# This file is included in the http {} block and applies globally to all hosts
# ==============================================================================

# Enhanced log format with Cloudflare information
# Captures real client IP, country, and request tracing from CF headers
log_format cloudflare_detailed '[$time_local] '
                                'IP: $http_cf_connecting_ip '
                                'Country: $http_cf_ipcountry '
                                'Status: $status '
                                'Method: $request_method '
                                'URL: $scheme://$host$request_uri '
                                'Bytes: $body_bytes_sent '
                                'Referer: "$http_referer" '
                                'User-Agent: "$http_user_agent" '
                                'CF-RAY: $http_cf_ray '
                                'Upstream: $upstream_addr '
                                'Response-Time: $upstream_response_time '
                                'Cache: $upstream_cache_status';

# Separate log format for errors (more detailed)
log_format cloudflare_error '[$time_local] '
                            'ERROR: $status '
                            'IP: $http_cf_connecting_ip '
                            'Country: $http_cf_ipcountry '
                            'Method: $request_method '
                            'URL: $scheme://$host$request_uri '
                            'CF-RAY: $http_cf_ray '
                            'User-Agent: "$http_user_agent" '
                            'Upstream: $upstream_addr '
                            'Error: $upstream_status';

# GeoIP mapping for fallback (if CF headers missing)
# Cloudflare headers should always be present, but this is a safety net
map $http_cf_connecting_ip $real_client_ip {
    default $http_cf_connecting_ip;
    ''      $remote_addr;  # Fallback to direct connection IP
}

# Map for conditional error logging (only log 4xx and 5xx status codes)
map $status $loggable_error {
    ~^[45]  1;  # Match 4xx and 5xx status codes
    default 0;  # Don't log 2xx and 3xx
}
# ==============================================================================
# Client Header Buffer Configuration
# ==============================================================================
# Issue: Cloudflare Tunnel adds large headers/cookies causing "400 Request Header Too Large"
# Solution: Increase buffer sizes to accommodate Cloudflare headers
# Default: client_header_buffer_size 1k, large_client_header_buffers 4 4k (16k max)
# New: Increased to handle Cloudflare headers properly
client_header_buffer_size 8k;
large_client_header_buffers 16 32k;  # Max 512kb - handles Cloudflare cookies/headers
