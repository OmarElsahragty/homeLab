# Tailscale Exit Node Audit Logger - Cron Configuration
# Add this to your crontab with: crontab -e

# Run audit logger every 5 minutes
*/5 * * * * /home/homeLab/scripts/tailscale-audit-logger.sh >> /home/homeLab/volumes/tailscale-logs/audit-logs/cron.log 2>&1

# Run audit logger daily at 2 AM for summary
0 2 * * * /home/homeLab/scripts/tailscale-audit-logger.sh >> /home/homeLab/volumes/tailscale-logs/audit-logs/daily-summary.log 2>&1

# Clean old logs and compress them (keep 30 days)
0 3 * * * find /home/homeLab/volumes/tailscale-logs -name "*.log" -mtime +30 -type f -delete

# Optional: Generate hourly traffic summary
0 * * * * /home/homeLab/scripts/tailscale-audit-logger.sh >> /home/homeLab/volumes/tailscale-logs/traffic-stats/hourly.log 2>&1

# ============================================================================
# INSTALLATION INSTRUCTIONS
# ============================================================================
# 
# 1. Open your crontab editor:
#    crontab -e
# 
# 2. Add any of the above cron jobs to your crontab
# 
# 3. Verify installation:
#    crontab -l
# 
# 4. Check cron logs:
#    sudo tail -f /var/log/syslog | grep CRON
#    (or for macOS: log stream --predicate 'process == "cron"')
# 
# ============================================================================
# CRON SCHEDULE REFERENCE
# ============================================================================
#
# */5 * * * *     - Every 5 minutes (12 times/hour)
# 0 * * * *       - Every hour
# 0 2 * * *       - Every day at 2 AM
# 0 */4 * * *     - Every 4 hours
# 0 0 * * 0       - Every Sunday at midnight (weekly)
# 0 0 1 * *       - First day of month (monthly)
#
# ============================================================================
